name: CI

on:
  push:
    branches: [master, dev, optimus_prime]
  pull_request:
    branches: [master]

jobs:
  rust-tests:
    name: Rust Tests
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      - name: Run tests
        run: cargo test

      - name: Build release
        run: cargo build --release

  validation:
    name: Validate vs Perl TrimGalore
    runs-on: ubuntu-latest
    needs: [rust-tests]
    defaults:
      run:
        shell: bash -l {0}

    steps:
      - uses: actions/checkout@v4

      - name: Set up Conda
        uses: conda-incubator/setup-miniconda@v3
        with:
          channels: bioconda,conda-forge,defaults
          channel-priority: strict
          auto-activate-base: false

      - name: Install Perl Trim Galore (v0.6.11) + Cutadapt
        run: |
          conda create -n perl_tg -y -c conda-forge -c bioconda cutadapt=5.2 "xopen<2"
          curl -fsSL https://raw.githubusercontent.com/FelixKrueger/TrimGalore/0.6.11/trim_galore -o /usr/local/bin/trim_galore_perl
          chmod +x /usr/local/bin/trim_galore_perl

      - name: Verify Perl Trim Galore
        run: |
          conda run -n perl_tg trim_galore_perl --version
          conda run -n perl_tg cutadapt --version

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      - name: Build Oxidized Edition
        run: cargo build --release

      - name: Validate single-end output
        run: |
          mkdir -p /tmp/tg /tmp/op
          conda run -n perl_tg trim_galore_perl -o /tmp/tg test_files/illumina_10K.fastq.gz
          ./target/release/trim_galore -o /tmp/op test_files/illumina_10K.fastq.gz
          TG_MD5=$(gzip -dc /tmp/tg/illumina_10K_trimmed.fq.gz | md5sum | cut -d' ' -f1)
          OP_MD5=$(gzip -dc /tmp/op/illumina_10K_trimmed.fq.gz | md5sum | cut -d' ' -f1)
          echo "TrimGalore: $TG_MD5"
          echo "Oxidized:   $OP_MD5"
          [ "$TG_MD5" = "$OP_MD5" ] || { echo "MISMATCH: single-end output differs!"; exit 1; }

      - name: Validate paired-end output
        run: |
          rm -rf /tmp/tg /tmp/op; mkdir -p /tmp/tg /tmp/op
          conda run -n perl_tg trim_galore_perl --paired -o /tmp/tg test_files/BS-seq_10K_R1.fastq.gz test_files/BS-seq_10K_R2.fastq.gz
          ./target/release/trim_galore --paired -o /tmp/op test_files/BS-seq_10K_R1.fastq.gz test_files/BS-seq_10K_R2.fastq.gz
          for f in BS-seq_10K_R1_val_1.fq.gz BS-seq_10K_R2_val_2.fq.gz; do
            TG_MD5=$(gzip -dc /tmp/tg/$f | md5sum | cut -d' ' -f1)
            OP_MD5=$(gzip -dc /tmp/op/$f | md5sum | cut -d' ' -f1)
            echo "$f: TG=$TG_MD5 OP=$OP_MD5"
            [ "$TG_MD5" = "$OP_MD5" ] || { echo "MISMATCH: $f differs!"; exit 1; }
          done

      - name: Validate multi-pair paired-end (regression guard — beta-1 reporter scenario)
        run: |
          rm -rf /tmp/op_multi; mkdir -p /tmp/op_multi
          # 3 pairs = 6 files, the scenario that triggered the beta-1 bug.
          for sample in A B C; do
            cp test_files/BS-seq_10K_R1.fastq.gz /tmp/op_multi/${sample}_R1.fastq.gz
            cp test_files/BS-seq_10K_R2.fastq.gz /tmp/op_multi/${sample}_R2.fastq.gz
          done
          ./target/release/trim_galore --paired -j 4 -o /tmp/op_multi \
            /tmp/op_multi/A_R1.fastq.gz /tmp/op_multi/A_R2.fastq.gz \
            /tmp/op_multi/B_R1.fastq.gz /tmp/op_multi/B_R2.fastq.gz \
            /tmp/op_multi/C_R1.fastq.gz /tmp/op_multi/C_R2.fastq.gz
          for sample in A B C; do
            test -f /tmp/op_multi/${sample}_R1_val_1.fq.gz
            test -f /tmp/op_multi/${sample}_R2_val_2.fq.gz
            test -f /tmp/op_multi/${sample}_R1.fastq.gz_trimming_report.txt
            test -f /tmp/op_multi/${sample}_R2.fastq.gz_trimming_report.txt
            test -f /tmp/op_multi/${sample}_R1.fastq.gz_trimming_report.json
            test -f /tmp/op_multi/${sample}_R2.fastq.gz_trimming_report.json
          done
          # Adapter auto-detection should run exactly once across the invocation
          # (on pair A / A_R1), then the detected adapter is reused for B and C.
          rm -rf /tmp/op_multi2; mkdir -p /tmp/op_multi2
          for sample in A B; do
            cp test_files/BS-seq_10K_R1.fastq.gz /tmp/op_multi2/${sample}_R1.fastq.gz
            cp test_files/BS-seq_10K_R2.fastq.gz /tmp/op_multi2/${sample}_R2.fastq.gz
          done
          ./target/release/trim_galore --paired -o /tmp/op_multi2 \
            /tmp/op_multi2/A_R1.fastq.gz /tmp/op_multi2/A_R2.fastq.gz \
            /tmp/op_multi2/B_R1.fastq.gz /tmp/op_multi2/B_R2.fastq.gz 2>&1 | tee /tmp/detect.log
          test "$(grep -c 'Auto-detecting adapter type' /tmp/detect.log)" = "1"

      - name: Validate paired-end rejects odd-count input
        run: |
          set +e
          ./target/release/trim_galore --paired test_files/BS-seq_10K_R1.fastq.gz 2>&1 | tee /tmp/odd.log
          rc=${PIPESTATUS[0]}
          set -e
          test $rc -ne 0
          grep -q "even number of input files" /tmp/odd.log

      - name: Validate paired-end rejects R1==R2
        run: |
          set +e
          ./target/release/trim_galore --paired \
            test_files/BS-seq_10K_R1.fastq.gz test_files/BS-seq_10K_R1.fastq.gz 2>&1 | tee /tmp/same.log
          rc=${PIPESTATUS[0]}
          set -e
          test $rc -ne 0
          grep -q "appear to be the same file" /tmp/same.log

      - name: Validate --basename rejected with multi-pair
        run: |
          set +e
          ./target/release/trim_galore --paired --basename foo \
            test_files/BS-seq_10K_R1.fastq.gz test_files/BS-seq_10K_R2.fastq.gz \
            test_files/BS-seq_10K_R1.fastq.gz test_files/BS-seq_10K_R2.fastq.gz 2>&1 | tee /tmp/bn.log
          rc=${PIPESTATUS[0]}
          set -e
          test $rc -ne 0
          grep -q "basename cannot be used with multiple" /tmp/bn.log

      - name: Validate --clock still requires exactly 2 inputs (no multi-pair widening)
        run: |
          set +e
          ./target/release/trim_galore --clock \
            test_files/clock_10K_R1.fastq.gz test_files/clock_10K_R2.fastq.gz \
            test_files/clock_10K_R1.fastq.gz test_files/clock_10K_R2.fastq.gz 2>&1 | tee /tmp/clock.log
          rc=${PIPESTATUS[0]}
          set -e
          test $rc -ne 0
          grep -q "clock requires exactly 2" /tmp/clock.log

      - name: Validate paired-end output-path collision pre-flight
        run: |
          # Two pairs with the same R1/R2 filename but different source dirs +
          # `-o /shared` would produce colliding outputs. Expect fail-fast
          # before any output files are written.
          rm -rf /tmp/op_coll; mkdir -p /tmp/op_coll/sub1 /tmp/op_coll/sub2 /tmp/op_coll/out
          cp test_files/BS-seq_10K_R1.fastq.gz /tmp/op_coll/sub1/sample_R1.fastq.gz
          cp test_files/BS-seq_10K_R2.fastq.gz /tmp/op_coll/sub1/sample_R2.fastq.gz
          cp test_files/BS-seq_10K_R1.fastq.gz /tmp/op_coll/sub2/sample_R1.fastq.gz
          cp test_files/BS-seq_10K_R2.fastq.gz /tmp/op_coll/sub2/sample_R2.fastq.gz
          set +e
          ./target/release/trim_galore --paired -o /tmp/op_coll/out \
            /tmp/op_coll/sub1/sample_R1.fastq.gz /tmp/op_coll/sub1/sample_R2.fastq.gz \
            /tmp/op_coll/sub2/sample_R1.fastq.gz /tmp/op_coll/sub2/sample_R2.fastq.gz 2>&1 | tee /tmp/coll.log
          rc=${PIPESTATUS[0]}
          set -e
          test $rc -ne 0
          grep -q "Output path collision" /tmp/coll.log
          # Fail-fast sanity: no fastq outputs should have been written.
          test -z "$(ls /tmp/op_coll/out/*.fq.gz 2>/dev/null)"

      - name: Validate paired-end collision pre-flight catches case-only aliases (issue #216)
        run: |
          # Two pairs whose R1/R2 filenames differ ONLY in letter-case would
          # alias the same physical file on APFS/NTFS and silently overwrite.
          # The ASCII-case-folded hash key must catch this on any filesystem.
          rm -rf /tmp/op_case; mkdir -p /tmp/op_case/out
          cp test_files/BS-seq_10K_R1.fastq.gz /tmp/op_case/Sample_R1.fastq.gz
          cp test_files/BS-seq_10K_R2.fastq.gz /tmp/op_case/Sample_R2.fastq.gz
          cp test_files/BS-seq_10K_R1.fastq.gz /tmp/op_case/SAMPLE_R1.fastq.gz
          cp test_files/BS-seq_10K_R2.fastq.gz /tmp/op_case/SAMPLE_R2.fastq.gz
          set +e
          ./target/release/trim_galore --paired -o /tmp/op_case/out \
            /tmp/op_case/Sample_R1.fastq.gz /tmp/op_case/Sample_R2.fastq.gz \
            /tmp/op_case/SAMPLE_R1.fastq.gz /tmp/op_case/SAMPLE_R2.fastq.gz 2>&1 | tee /tmp/case.log
          rc=${PIPESTATUS[0]}
          set -e
          test $rc -ne 0
          grep -q "Output path collision" /tmp/case.log
          grep -q "case-insensitive match" /tmp/case.log
          test -z "$(ls /tmp/op_case/out/*.fq.gz 2>/dev/null)"

      - name: Validate multi-pair with --cores 1 (sequential path)
        run: |
          rm -rf /tmp/op_multi_seq; mkdir -p /tmp/op_multi_seq
          for sample in A B; do
            cp test_files/BS-seq_10K_R1.fastq.gz /tmp/op_multi_seq/${sample}_R1.fastq.gz
            cp test_files/BS-seq_10K_R2.fastq.gz /tmp/op_multi_seq/${sample}_R2.fastq.gz
          done
          ./target/release/trim_galore --paired --cores 1 -o /tmp/op_multi_seq \
            /tmp/op_multi_seq/A_R1.fastq.gz /tmp/op_multi_seq/A_R2.fastq.gz \
            /tmp/op_multi_seq/B_R1.fastq.gz /tmp/op_multi_seq/B_R2.fastq.gz
          test -f /tmp/op_multi_seq/A_R1_val_1.fq.gz
          test -f /tmp/op_multi_seq/B_R2_val_2.fq.gz

      - name: Validate hardtrim5
        run: |
          rm -rf /tmp/tg /tmp/op; mkdir -p /tmp/tg /tmp/op
          conda run -n perl_tg trim_galore_perl --hardtrim5 30 -o /tmp/tg test_files/illumina_10K.fastq.gz
          ./target/release/trim_galore --hardtrim5 30 -o /tmp/op test_files/illumina_10K.fastq.gz
          TG_MD5=$(gzip -dc /tmp/tg/illumina_10K.30bp_5prime.fq.gz | md5sum | cut -d' ' -f1)
          OP_MD5=$(gzip -dc /tmp/op/illumina_10K.30bp_5prime.fq.gz | md5sum | cut -d' ' -f1)
          [ "$TG_MD5" = "$OP_MD5" ] || { echo "MISMATCH: hardtrim5 differs!"; exit 1; }

      - name: Validate clock mode
        run: |
          rm -rf /tmp/tg /tmp/op; mkdir -p /tmp/tg /tmp/op
          conda run -n perl_tg trim_galore_perl --clock --paired -o /tmp/tg test_files/clock_10K_R1.fastq.gz test_files/clock_10K_R2.fastq.gz
          ./target/release/trim_galore --clock -o /tmp/op test_files/clock_10K_R1.fastq.gz test_files/clock_10K_R2.fastq.gz
          for f in clock_10K_R1.clock_UMI.R1.fq.gz clock_10K_R2.clock_UMI.R2.fq.gz; do
            TG_MD5=$(gzip -dc /tmp/tg/$f | md5sum | cut -d' ' -f1)
            OP_MD5=$(gzip -dc /tmp/op/$f | md5sum | cut -d' ' -f1)
            [ "$TG_MD5" = "$OP_MD5" ] || { echo "MISMATCH: clock $f differs!"; exit 1; }
          done

      - name: Validate demux
        run: |
          rm -rf /tmp/tg /tmp/op; mkdir -p /tmp/tg /tmp/op
          conda run -n perl_tg trim_galore_perl --demux test_files/demux_test_samplesheet.txt -o /tmp/tg test_files/demux_test.fastq.gz
          # --no_poly_g: disable v2.0 auto poly-G detection so output matches Perl v0.6.11
          ./target/release/trim_galore --no_poly_g --demux test_files/demux_test_samplesheet.txt -o /tmp/op test_files/demux_test.fastq.gz
          for f in demux_test_trimmed_sample1.fq.gz demux_test_trimmed_sample2.fq.gz demux_test_trimmed_sample3.fq.gz demux_test_trimmed_NoCode.fq.gz; do
            TG_MD5=$(gzip -dc /tmp/tg/$f | md5sum | cut -d' ' -f1)
            OP_MD5=$(gzip -dc /tmp/op/$f | md5sum | cut -d' ' -f1)
            echo "$f: TG=$TG_MD5 OP=$OP_MD5"
            [ "$TG_MD5" = "$OP_MD5" ] || { echo "MISMATCH: $f differs!"; exit 1; }
          done

      - name: All validations passed
        run: echo "All Oxidized Edition outputs are byte-identical to Perl TrimGalore 0.6.11"
