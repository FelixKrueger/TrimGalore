name: CI

on:
  push:
    branches: [master, dev, optimus_prime]
  pull_request:
    branches: [master]

jobs:
  rust-tests:
    name: Rust Tests
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      - name: Run tests
        run: cargo test

      - name: Build release
        run: cargo build --release

  validation:
    name: Validate vs Perl TrimGalore
    runs-on: ubuntu-latest
    needs: [rust-tests]

    steps:
      - uses: actions/checkout@v4

      - name: Install Perl Trim Galore (v0.6.11) + Cutadapt
        run: |
          pip install cutadapt==5.2
          curl -fsSL https://raw.githubusercontent.com/FelixKrueger/TrimGalore/0.6.11/trim_galore -o /usr/local/bin/trim_galore_perl
          chmod +x /usr/local/bin/trim_galore_perl

      - name: Verify Perl Trim Galore
        run: |
          trim_galore_perl --version
          cutadapt --version

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      - name: Build Oxidized Edition
        run: cargo build --release

      - name: Validate single-end output
        run: |
          mkdir -p /tmp/tg /tmp/op
          trim_galore_perl -o /tmp/tg test_files/illumina_10K.fastq.gz
          ./target/release/trim_galore -o /tmp/op test_files/illumina_10K.fastq.gz
          TG_MD5=$(gzip -dc /tmp/tg/illumina_10K_trimmed.fq.gz | md5sum | cut -d' ' -f1)
          OP_MD5=$(gzip -dc /tmp/op/illumina_10K_trimmed.fq.gz | md5sum | cut -d' ' -f1)
          echo "TrimGalore: $TG_MD5"
          echo "Oxidized:   $OP_MD5"
          [ "$TG_MD5" = "$OP_MD5" ] || { echo "MISMATCH: single-end output differs!"; exit 1; }

      - name: Validate paired-end output
        run: |
          rm -rf /tmp/tg /tmp/op; mkdir -p /tmp/tg /tmp/op
          trim_galore_perl --paired -o /tmp/tg test_files/BS-seq_10K_R1.fastq.gz test_files/BS-seq_10K_R2.fastq.gz
          ./target/release/trim_galore --paired -o /tmp/op test_files/BS-seq_10K_R1.fastq.gz test_files/BS-seq_10K_R2.fastq.gz
          for f in BS-seq_10K_R1_val_1.fq.gz BS-seq_10K_R2_val_2.fq.gz; do
            TG_MD5=$(gzip -dc /tmp/tg/$f | md5sum | cut -d' ' -f1)
            OP_MD5=$(gzip -dc /tmp/op/$f | md5sum | cut -d' ' -f1)
            echo "$f: TG=$TG_MD5 OP=$OP_MD5"
            [ "$TG_MD5" = "$OP_MD5" ] || { echo "MISMATCH: $f differs!"; exit 1; }
          done

      - name: Validate hardtrim5
        run: |
          rm -rf /tmp/tg /tmp/op; mkdir -p /tmp/tg /tmp/op
          trim_galore_perl --hardtrim5 30 -o /tmp/tg test_files/illumina_10K.fastq.gz
          ./target/release/trim_galore --hardtrim5 30 -o /tmp/op test_files/illumina_10K.fastq.gz
          TG_MD5=$(gzip -dc /tmp/tg/illumina_10K.30bp_5prime.fq.gz | md5sum | cut -d' ' -f1)
          OP_MD5=$(gzip -dc /tmp/op/illumina_10K.30bp_5prime.fq.gz | md5sum | cut -d' ' -f1)
          [ "$TG_MD5" = "$OP_MD5" ] || { echo "MISMATCH: hardtrim5 differs!"; exit 1; }

      - name: Validate clock mode
        run: |
          rm -rf /tmp/tg /tmp/op; mkdir -p /tmp/tg /tmp/op
          trim_galore_perl --clock --paired -o /tmp/tg test_files/clock_10K_R1.fastq.gz test_files/clock_10K_R2.fastq.gz
          ./target/release/trim_galore --clock -o /tmp/op test_files/clock_10K_R1.fastq.gz test_files/clock_10K_R2.fastq.gz
          for f in clock_10K_R1.clock_UMI.R1.fq.gz clock_10K_R2.clock_UMI.R2.fq.gz; do
            TG_MD5=$(gzip -dc /tmp/tg/$f | md5sum | cut -d' ' -f1)
            OP_MD5=$(gzip -dc /tmp/op/$f | md5sum | cut -d' ' -f1)
            [ "$TG_MD5" = "$OP_MD5" ] || { echo "MISMATCH: clock $f differs!"; exit 1; }
          done

      - name: Validate demux
        run: |
          rm -rf /tmp/tg /tmp/op; mkdir -p /tmp/tg /tmp/op
          trim_galore_perl --demux test_files/demux_test_samplesheet.txt -o /tmp/tg test_files/demux_test.fastq.gz
          ./target/release/trim_galore --demux test_files/demux_test_samplesheet.txt -o /tmp/op test_files/demux_test.fastq.gz
          for f in demux_test_trimmed_sample1.fq.gz demux_test_trimmed_sample2.fq.gz demux_test_trimmed_sample3.fq.gz demux_test_trimmed_NoCode.fq.gz; do
            TG_MD5=$(gzip -dc /tmp/tg/$f | md5sum | cut -d' ' -f1)
            OP_MD5=$(gzip -dc /tmp/op/$f | md5sum | cut -d' ' -f1)
            [ "$TG_MD5" = "$OP_MD5" ] || { echo "MISMATCH: demux $f differs!"; exit 1; }
          done
          diff /tmp/tg/demux_test_trimmed_demultiplexing_summary.txt /tmp/op/demux_test_trimmed_demultiplexing_summary.txt

      - name: All validations passed
        run: echo "All Oxidized Edition outputs are byte-identical to Perl TrimGalore 0.6.11"
