name: CI

on:
  push:
    branches: [master, dev, optimus_prime]
  pull_request:
    # Trigger on PRs targeting any active integration branch — `optimus_prime`
    # is the active dev branch for the Oxidized Edition; `master` stays listed
    # for the Perl release line.
    branches: [master, optimus_prime]
  # Weekly cron so the `audit` job surfaces new RustSec advisories even during
  # quiet weeks (no pushes / PRs).  Non-audit jobs skip on schedule via the
  # per-job `if: github.event_name != 'schedule'` guard below.
  schedule:
    - cron: "0 6 * * 1" # Mondays 06:00 UTC

jobs:
  rust-tests:
    name: Rust Tests
    if: github.event_name != 'schedule'
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable

      - name: Cache cargo
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      - name: Run tests
        run: cargo test

      - name: Build release
        run: cargo build --release

      - name: Verify --version carries provenance
        run: |
          # Content-targeted grep (not line count): the provenance line must match
          # <git-hash> — <os>/<arch> — built <ISO-8601-UTC>. The em-dash is literal.
          ./target/release/trim_galore --version \
            | grep -qE '^[0-9a-f]{7,40} — [a-z0-9_]+/[a-z0-9_]+ — built [0-9T:Z-]+$'
          # -V must NOT carry the provenance line (stays the short form).
          ! ./target/release/trim_galore -V \
            | grep -qE '^[0-9a-f]{7,40} — '

  reproducibility:
    name: Reproducibility (SOURCE_DATE_EPOCH)
    # Dedicated job with its own cache — `cargo clean` inside here would trash
    # the `rust-tests` cache if co-located. Parallel to `rust-tests` so no
    # wall-clock cost.
    if: github.event_name != 'schedule'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
      - name: Cache cargo (reproducibility job)
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
          # target/ intentionally excluded — this job does `cargo clean` twice.
          key: ${{ runner.os }}-cargo-repro-${{ hashFiles('Cargo.lock') }}
          # Narrow to the repro-specific prefix so we don't restore `target/`
          # from the `rust-tests` cache (which would be wiped by `cargo clean`
          # anyway — just avoids wasting restore bandwidth).
          restore-keys: ${{ runner.os }}-cargo-repro-
      - name: Build twice with same SOURCE_DATE_EPOCH, assert bit-identical
        run: |
          # `export` (not `VAR=x cmd1 && cmd2`) — the shell-prefix form only
          # scopes the var to cmd1, so `cargo build` after the `&&` would fall
          # back to wall-clock time and break bit-identity.
          export SOURCE_DATE_EPOCH=1700000000
          cargo clean && cargo build --release
          sha256sum target/release/trim_galore | awk '{print $1}' > /tmp/sha_a
          cargo clean && cargo build --release
          sha256sum target/release/trim_galore | awk '{print $1}' > /tmp/sha_b
          diff /tmp/sha_a /tmp/sha_b
      - name: Malformed SOURCE_DATE_EPOCH hard-fails build
        run: |
          # Build script must panic with a message mentioning SOURCE_DATE_EPOCH,
          # not silently fall back to wall-clock time.
          set +e
          SOURCE_DATE_EPOCH=garbage cargo clean
          SOURCE_DATE_EPOCH=garbage cargo build --release 2>&1 | tee /tmp/sde.log
          rc=${PIPESTATUS[0]}
          set -e
          test $rc -ne 0
          grep -q "SOURCE_DATE_EPOCH" /tmp/sde.log

  lint:
    name: Lint (fmt + clippy)
    if: github.event_name != 'schedule'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
        with:
          components: rustfmt, clippy
      - name: Cache cargo
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-lint-${{ hashFiles('Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-
      - name: cargo fmt --check
        run: cargo fmt --all -- --check
      - name: cargo clippy (release, all targets, -D warnings)
        run: cargo clippy --all-targets --release -- -D warnings

  audit:
    name: Security audit
    runs-on: ubuntu-latest
    permissions:
      contents: read
      checks: write
      issues: write
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: rustsec/audit-check@69366f33c96575abad1ee0dba8212993eecbe998 # v2.0.0
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

  validation:
    name: Validate vs Perl TrimGalore
    if: github.event_name != 'schedule'
    runs-on: ubuntu-latest
    needs: [rust-tests, lint]
    defaults:
      run:
        shell: bash -l {0}

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Set up Conda
        uses: conda-incubator/setup-miniconda@8ee1f361103df19b6f8c8655fd3967a8ecb162d5 # v4.0.1
        with:
          channels: bioconda,conda-forge,defaults
          channel-priority: strict
          auto-activate-base: false

      - name: Install Perl Trim Galore (v0.6.11) + Cutadapt
        run: |
          conda create -n perl_tg -y -c conda-forge -c bioconda cutadapt=5.2 "xopen<2"
          curl -fsSL https://raw.githubusercontent.com/FelixKrueger/TrimGalore/0.6.11/trim_galore -o /usr/local/bin/trim_galore_perl
          chmod +x /usr/local/bin/trim_galore_perl

      - name: Verify Perl Trim Galore
        run: |
          conda run -n perl_tg trim_galore_perl --version
          conda run -n perl_tg cutadapt --version

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable

      - name: Cache cargo
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      - name: Build Oxidized Edition
        run: cargo build --release

      - name: Validate single-end output
        run: |
          mkdir -p /tmp/tg /tmp/op
          conda run -n perl_tg trim_galore_perl -o /tmp/tg test_files/illumina_10K.fastq.gz
          ./target/release/trim_galore -o /tmp/op test_files/illumina_10K.fastq.gz
          TG_MD5=$(gzip -dc /tmp/tg/illumina_10K_trimmed.fq.gz | md5sum | cut -d' ' -f1)
          OP_MD5=$(gzip -dc /tmp/op/illumina_10K_trimmed.fq.gz | md5sum | cut -d' ' -f1)
          echo "TrimGalore: $TG_MD5"
          echo "Oxidized:   $OP_MD5"
          [ "$TG_MD5" = "$OP_MD5" ] || { echo "MISMATCH: single-end output differs!"; exit 1; }

      - name: Validate paired-end output
        run: |
          rm -rf /tmp/tg /tmp/op; mkdir -p /tmp/tg /tmp/op
          conda run -n perl_tg trim_galore_perl --paired -o /tmp/tg test_files/BS-seq_10K_R1.fastq.gz test_files/BS-seq_10K_R2.fastq.gz
          ./target/release/trim_galore --paired -o /tmp/op test_files/BS-seq_10K_R1.fastq.gz test_files/BS-seq_10K_R2.fastq.gz
          for f in BS-seq_10K_R1_val_1.fq.gz BS-seq_10K_R2_val_2.fq.gz; do
            TG_MD5=$(gzip -dc /tmp/tg/$f | md5sum | cut -d' ' -f1)
            OP_MD5=$(gzip -dc /tmp/op/$f | md5sum | cut -d' ' -f1)
            echo "$f: TG=$TG_MD5 OP=$OP_MD5"
            [ "$TG_MD5" = "$OP_MD5" ] || { echo "MISMATCH: $f differs!"; exit 1; }
          done

      - name: Validate multi-pair paired-end (regression guard — beta-1 reporter scenario)
        run: |
          rm -rf /tmp/op_multi; mkdir -p /tmp/op_multi
          # 3 pairs = 6 files, the scenario that triggered the beta-1 bug.
          for sample in A B C; do
            cp test_files/BS-seq_10K_R1.fastq.gz /tmp/op_multi/${sample}_R1.fastq.gz
            cp test_files/BS-seq_10K_R2.fastq.gz /tmp/op_multi/${sample}_R2.fastq.gz
          done
          ./target/release/trim_galore --paired -j 4 -o /tmp/op_multi \
            /tmp/op_multi/A_R1.fastq.gz /tmp/op_multi/A_R2.fastq.gz \
            /tmp/op_multi/B_R1.fastq.gz /tmp/op_multi/B_R2.fastq.gz \
            /tmp/op_multi/C_R1.fastq.gz /tmp/op_multi/C_R2.fastq.gz
          for sample in A B C; do
            test -f /tmp/op_multi/${sample}_R1_val_1.fq.gz
            test -f /tmp/op_multi/${sample}_R2_val_2.fq.gz
            test -f /tmp/op_multi/${sample}_R1.fastq.gz_trimming_report.txt
            test -f /tmp/op_multi/${sample}_R2.fastq.gz_trimming_report.txt
            test -f /tmp/op_multi/${sample}_R1.fastq.gz_trimming_report.json
            test -f /tmp/op_multi/${sample}_R2.fastq.gz_trimming_report.json
          done
          # Adapter auto-detection runs PER PAIR (intentional deviation from
          # Perl v0.6.x for safer handling of mixed library types across a
          # shell-glob invocation). 2 pairs → 2 detection log lines.
          rm -rf /tmp/op_multi2; mkdir -p /tmp/op_multi2
          for sample in A B; do
            cp test_files/BS-seq_10K_R1.fastq.gz /tmp/op_multi2/${sample}_R1.fastq.gz
            cp test_files/BS-seq_10K_R2.fastq.gz /tmp/op_multi2/${sample}_R2.fastq.gz
          done
          ./target/release/trim_galore --paired -o /tmp/op_multi2 \
            /tmp/op_multi2/A_R1.fastq.gz /tmp/op_multi2/A_R2.fastq.gz \
            /tmp/op_multi2/B_R1.fastq.gz /tmp/op_multi2/B_R2.fastq.gz 2>&1 | tee /tmp/detect.log
          test "$(grep -c 'Auto-detecting adapter type' /tmp/detect.log)" = "2"

      - name: Validate paired-end rejects odd-count input
        run: |
          set +e
          ./target/release/trim_galore --paired test_files/BS-seq_10K_R1.fastq.gz 2>&1 | tee /tmp/odd.log
          rc=${PIPESTATUS[0]}
          set -e
          test $rc -ne 0
          grep -q "even number of input files" /tmp/odd.log

      - name: Validate paired-end rejects R1==R2
        run: |
          set +e
          ./target/release/trim_galore --paired \
            test_files/BS-seq_10K_R1.fastq.gz test_files/BS-seq_10K_R1.fastq.gz 2>&1 | tee /tmp/same.log
          rc=${PIPESTATUS[0]}
          set -e
          test $rc -ne 0
          grep -q "appear to be the same file" /tmp/same.log

      - name: Validate --basename rejected with multi-pair
        run: |
          set +e
          # Use two DISTINCT pairs — R1/R2 repeated twice now trips the
          # cross-pair duplicate check (added in PR #219) before the basename
          # branch is reached. The assertion here is about basename rejection,
          # not duplicate detection, so exercise with BS-seq + SRR24766921.
          ./target/release/trim_galore --paired --basename foo \
            test_files/BS-seq_10K_R1.fastq.gz test_files/BS-seq_10K_R2.fastq.gz \
            test_files/SRR24766921_RRBS_R1.fastq.gz test_files/SRR24766921_RRBS_R2.fastq.gz 2>&1 | tee /tmp/bn.log
          rc=${PIPESTATUS[0]}
          set -e
          test $rc -ne 0
          grep -q "basename cannot be used with multiple" /tmp/bn.log

      - name: Validate multi-pair --clock (regression guard for the v2.x widening)
        run: |
          rm -rf /tmp/clock_multi; mkdir -p /tmp/clock_multi
          for sample in A B; do
            cp test_files/clock_10K_R1.fastq.gz /tmp/clock_multi/${sample}_R1.fastq.gz
            cp test_files/clock_10K_R2.fastq.gz /tmp/clock_multi/${sample}_R2.fastq.gz
          done
          ./target/release/trim_galore --clock -o /tmp/clock_multi \
            /tmp/clock_multi/A_R1.fastq.gz /tmp/clock_multi/A_R2.fastq.gz \
            /tmp/clock_multi/B_R1.fastq.gz /tmp/clock_multi/B_R2.fastq.gz 2>&1 | tee /tmp/clock_multi.log
          # Per-pair header should be emitted in multi-pair mode
          grep -q 'Clock pair 1 of 2' /tmp/clock_multi.log
          grep -q 'Clock pair 2 of 2' /tmp/clock_multi.log
          # Per-pair output files should exist
          for sample in A B; do
            test -f /tmp/clock_multi/${sample}_R1.clock_UMI.R1.fq.gz
            test -f /tmp/clock_multi/${sample}_R2.clock_UMI.R2.fq.gz
          done

      - name: Validate multi-pair --implicon
        run: |
          rm -rf /tmp/implicon_multi; mkdir -p /tmp/implicon_multi
          for sample in A B; do
            cp test_files/BS-seq_10K_R1.fastq.gz /tmp/implicon_multi/${sample}_R1.fastq.gz
            cp test_files/BS-seq_10K_R2.fastq.gz /tmp/implicon_multi/${sample}_R2.fastq.gz
          done
          ./target/release/trim_galore --implicon -o /tmp/implicon_multi \
            /tmp/implicon_multi/A_R1.fastq.gz /tmp/implicon_multi/A_R2.fastq.gz \
            /tmp/implicon_multi/B_R1.fastq.gz /tmp/implicon_multi/B_R2.fastq.gz 2>&1 | tee /tmp/implicon_multi.log
          grep -q 'IMPLICON pair 1 of 2' /tmp/implicon_multi.log
          grep -q 'IMPLICON pair 2 of 2' /tmp/implicon_multi.log
          for sample in A B; do
            test -f /tmp/implicon_multi/${sample}_8bp_UMI_R1.fastq.gz
            test -f /tmp/implicon_multi/${sample}_8bp_UMI_R2.fastq.gz
          done

      - name: Validate --clock duplicate-pair rejection (regression guard)
        run: |
          set +e
          ./target/release/trim_galore --clock \
            test_files/clock_10K_R1.fastq.gz test_files/clock_10K_R2.fastq.gz \
            test_files/clock_10K_R1.fastq.gz test_files/clock_10K_R2.fastq.gz 2>&1 | tee /tmp/clock_dup.log
          rc=${PIPESTATUS[0]}
          set -e
          test $rc -ne 0
          grep -q 'duplicate of pair' /tmp/clock_dup.log

      - name: Validate --clock odd-count rejection (regression guard)
        run: |
          set +e
          ./target/release/trim_galore --clock \
            test_files/clock_10K_R1.fastq.gz test_files/clock_10K_R2.fastq.gz \
            test_files/clock_10K_R1.fastq.gz 2>&1 | tee /tmp/clock_odd.log
          rc=${PIPESTATUS[0]}
          set -e
          test $rc -ne 0
          grep -q 'even number' /tmp/clock_odd.log

      - name: Validate bundled FastQC produces canonical output files
        run: |
          # Smoke test for the bundled fastqc-rust integration. Validates:
          #   1. --fastqc produces *_fastqc.html and *_fastqc.zip alongside
          #      the trimmed output (canonical Java FastQC filename pattern).
          #   2. The .zip contains the expected directory layout that
          #      MultiQC parsers latch onto (summary.txt, fastqc_data.txt,
          #      Images/, Icons/).
          #   3. No external `fastqc` is on $PATH inside the CI runner
          #      (the dtolnay/rust-toolchain base image doesn't ship it),
          #      so a green run here proves the bundled library is doing
          #      the work — not an accidental shell-out.
          rm -rf /tmp/op_fastqc; mkdir -p /tmp/op_fastqc
          ! command -v fastqc  # confirm no external fastqc on PATH
          ./target/release/trim_galore --fastqc -o /tmp/op_fastqc \
            test_files/illumina_10K.fastq.gz
          test -f /tmp/op_fastqc/illumina_10K_trimmed_fastqc.html
          test -f /tmp/op_fastqc/illumina_10K_trimmed_fastqc.zip
          unzip -l /tmp/op_fastqc/illumina_10K_trimmed_fastqc.zip | grep -q summary.txt
          unzip -l /tmp/op_fastqc/illumina_10K_trimmed_fastqc.zip | grep -q fastqc_data.txt
          unzip -l /tmp/op_fastqc/illumina_10K_trimmed_fastqc.zip | grep -q 'Images/'
          unzip -l /tmp/op_fastqc/illumina_10K_trimmed_fastqc.zip | grep -q 'Icons/'

      - name: Validate paired-end output-path collision pre-flight
        run: |
          # Two pairs with the same R1/R2 filename but different source dirs +
          # `-o /shared` would produce colliding outputs. Expect fail-fast
          # before any output files are written.
          rm -rf /tmp/op_coll; mkdir -p /tmp/op_coll/sub1 /tmp/op_coll/sub2 /tmp/op_coll/out
          cp test_files/BS-seq_10K_R1.fastq.gz /tmp/op_coll/sub1/sample_R1.fastq.gz
          cp test_files/BS-seq_10K_R2.fastq.gz /tmp/op_coll/sub1/sample_R2.fastq.gz
          cp test_files/BS-seq_10K_R1.fastq.gz /tmp/op_coll/sub2/sample_R1.fastq.gz
          cp test_files/BS-seq_10K_R2.fastq.gz /tmp/op_coll/sub2/sample_R2.fastq.gz
          set +e
          ./target/release/trim_galore --paired -o /tmp/op_coll/out \
            /tmp/op_coll/sub1/sample_R1.fastq.gz /tmp/op_coll/sub1/sample_R2.fastq.gz \
            /tmp/op_coll/sub2/sample_R1.fastq.gz /tmp/op_coll/sub2/sample_R2.fastq.gz 2>&1 | tee /tmp/coll.log
          rc=${PIPESTATUS[0]}
          set -e
          test $rc -ne 0
          grep -q "Output path collision" /tmp/coll.log
          # Fail-fast sanity: NOTHING should be written — covers trimming
          # reports (*.txt, *.json) and FastQC output too, not just *.fq.gz.
          # Drops the glob so a future report-naming change can't silently
          # mask a regression here.
          test -z "$(ls -A /tmp/op_coll/out 2>/dev/null)"

      - name: Validate paired-end collision pre-flight catches case-only aliases (issue #216)
        run: |
          # Two pairs whose R1/R2 filenames differ ONLY in letter-case would
          # alias the same physical file on APFS/NTFS and silently overwrite.
          # The ASCII-case-folded hash key must catch this on any filesystem.
          rm -rf /tmp/op_case; mkdir -p /tmp/op_case/out
          cp test_files/BS-seq_10K_R1.fastq.gz /tmp/op_case/Sample_R1.fastq.gz
          cp test_files/BS-seq_10K_R2.fastq.gz /tmp/op_case/Sample_R2.fastq.gz
          cp test_files/BS-seq_10K_R1.fastq.gz /tmp/op_case/SAMPLE_R1.fastq.gz
          cp test_files/BS-seq_10K_R2.fastq.gz /tmp/op_case/SAMPLE_R2.fastq.gz
          set +e
          ./target/release/trim_galore --paired -o /tmp/op_case/out \
            /tmp/op_case/Sample_R1.fastq.gz /tmp/op_case/Sample_R2.fastq.gz \
            /tmp/op_case/SAMPLE_R1.fastq.gz /tmp/op_case/SAMPLE_R2.fastq.gz 2>&1 | tee /tmp/case.log
          rc=${PIPESTATUS[0]}
          set -e
          test $rc -ne 0
          grep -q "Output path collision" /tmp/case.log
          # PR #219 reworded the qualifier from "case-insensitive match"
          # to "case-insensitive, for APFS/NTFS safety" when it switched the
          # error to name both colliding paths. Tighten grep to the new form.
          grep -q "case-insensitive, for APFS/NTFS safety" /tmp/case.log
          # Fail-fast sanity: NOTHING should be written — covers reports too.
          test -z "$(ls -A /tmp/op_case/out 2>/dev/null)"

      - name: Validate multi-pair with --cores 1 (sequential path)
        run: |
          rm -rf /tmp/op_multi_seq; mkdir -p /tmp/op_multi_seq
          for sample in A B; do
            cp test_files/BS-seq_10K_R1.fastq.gz /tmp/op_multi_seq/${sample}_R1.fastq.gz
            cp test_files/BS-seq_10K_R2.fastq.gz /tmp/op_multi_seq/${sample}_R2.fastq.gz
          done
          ./target/release/trim_galore --paired --cores 1 -o /tmp/op_multi_seq \
            /tmp/op_multi_seq/A_R1.fastq.gz /tmp/op_multi_seq/A_R2.fastq.gz \
            /tmp/op_multi_seq/B_R1.fastq.gz /tmp/op_multi_seq/B_R2.fastq.gz
          test -f /tmp/op_multi_seq/A_R1_val_1.fq.gz
          test -f /tmp/op_multi_seq/B_R2_val_2.fq.gz

      - name: Validate --retain_unpaired × multi-pair produces per-pair unpaired files
        run: |
          # Exercises the retain_unpaired branch of the collision pre-flight
          # (src/main.rs:101–111) plus per-pair unpaired naming. Uses
          # `--length 80` so the trimming threshold is strict enough to
          # force some reads into the unpaired bucket on BS-seq 10K fixtures.
          rm -rf /tmp/op_retain; mkdir -p /tmp/op_retain
          for sample in A B; do
            cp test_files/BS-seq_10K_R1.fastq.gz /tmp/op_retain/${sample}_R1.fastq.gz
            cp test_files/BS-seq_10K_R2.fastq.gz /tmp/op_retain/${sample}_R2.fastq.gz
          done
          ./target/release/trim_galore --paired --retain_unpaired --length 80 \
            -o /tmp/op_retain \
            /tmp/op_retain/A_R1.fastq.gz /tmp/op_retain/A_R2.fastq.gz \
            /tmp/op_retain/B_R1.fastq.gz /tmp/op_retain/B_R2.fastq.gz
          # Each pair must produce its own val_1 / val_2 AND its own
          # unpaired_1 / unpaired_2 file — no sharing, no overwrites.
          for sample in A B; do
            test -f /tmp/op_retain/${sample}_R1_val_1.fq.gz
            test -f /tmp/op_retain/${sample}_R2_val_2.fq.gz
            test -f /tmp/op_retain/${sample}_R1_unpaired_1.fq.gz
            test -f /tmp/op_retain/${sample}_R2_unpaired_2.fq.gz
          done

      - name: Validate missing input mid-list fails fast
        run: |
          # If input N in a multi-pair list does not exist, `Cli::validate()`
          # must fail before any pair starts processing — no partial outputs.
          # Here pair B's R1 is intentionally not created.
          rm -rf /tmp/op_missing; mkdir -p /tmp/op_missing
          cp test_files/BS-seq_10K_R1.fastq.gz /tmp/op_missing/A_R1.fastq.gz
          cp test_files/BS-seq_10K_R2.fastq.gz /tmp/op_missing/A_R2.fastq.gz
          # B_R1 deliberately absent
          cp test_files/BS-seq_10K_R2.fastq.gz /tmp/op_missing/B_R2.fastq.gz
          cp test_files/BS-seq_10K_R1.fastq.gz /tmp/op_missing/C_R1.fastq.gz
          cp test_files/BS-seq_10K_R2.fastq.gz /tmp/op_missing/C_R2.fastq.gz
          set +e
          ./target/release/trim_galore --paired -o /tmp/op_missing \
            /tmp/op_missing/A_R1.fastq.gz /tmp/op_missing/A_R2.fastq.gz \
            /tmp/op_missing/B_R1.fastq.gz /tmp/op_missing/B_R2.fastq.gz \
            /tmp/op_missing/C_R1.fastq.gz /tmp/op_missing/C_R2.fastq.gz 2>&1 | tee /tmp/missing.log
          rc=${PIPESTATUS[0]}
          set -e
          test $rc -ne 0
          grep -q "Input file not found" /tmp/missing.log
          # Critical fail-fast assertion: pair A must NOT have been processed
          # before validation caught the missing B_R1.
          test ! -f /tmp/op_missing/A_R1_val_1.fq.gz
          test ! -f /tmp/op_missing/A_R2_val_2.fq.gz
          test ! -f /tmp/op_missing/C_R1_val_1.fq.gz

      - name: Validate hardtrim5
        run: |
          rm -rf /tmp/tg /tmp/op; mkdir -p /tmp/tg /tmp/op
          conda run -n perl_tg trim_galore_perl --hardtrim5 30 -o /tmp/tg test_files/illumina_10K.fastq.gz
          ./target/release/trim_galore --hardtrim5 30 -o /tmp/op test_files/illumina_10K.fastq.gz
          TG_MD5=$(gzip -dc /tmp/tg/illumina_10K.30bp_5prime.fq.gz | md5sum | cut -d' ' -f1)
          OP_MD5=$(gzip -dc /tmp/op/illumina_10K.30bp_5prime.fq.gz | md5sum | cut -d' ' -f1)
          [ "$TG_MD5" = "$OP_MD5" ] || { echo "MISMATCH: hardtrim5 differs!"; exit 1; }

      - name: Validate clock mode
        run: |
          rm -rf /tmp/tg /tmp/op; mkdir -p /tmp/tg /tmp/op
          conda run -n perl_tg trim_galore_perl --clock --paired -o /tmp/tg test_files/clock_10K_R1.fastq.gz test_files/clock_10K_R2.fastq.gz
          ./target/release/trim_galore --clock -o /tmp/op test_files/clock_10K_R1.fastq.gz test_files/clock_10K_R2.fastq.gz
          for f in clock_10K_R1.clock_UMI.R1.fq.gz clock_10K_R2.clock_UMI.R2.fq.gz; do
            TG_MD5=$(gzip -dc /tmp/tg/$f | md5sum | cut -d' ' -f1)
            OP_MD5=$(gzip -dc /tmp/op/$f | md5sum | cut -d' ' -f1)
            [ "$TG_MD5" = "$OP_MD5" ] || { echo "MISMATCH: clock $f differs!"; exit 1; }
          done

      - name: Validate demux
        run: |
          rm -rf /tmp/tg /tmp/op; mkdir -p /tmp/tg /tmp/op
          conda run -n perl_tg trim_galore_perl --demux test_files/demux_test_samplesheet.txt -o /tmp/tg test_files/demux_test.fastq.gz
          # --no_poly_g: disable v2.0 auto poly-G detection so output matches Perl v0.6.11
          ./target/release/trim_galore --no_poly_g --demux test_files/demux_test_samplesheet.txt -o /tmp/op test_files/demux_test.fastq.gz
          for f in demux_test_trimmed_sample1.fq.gz demux_test_trimmed_sample2.fq.gz demux_test_trimmed_sample3.fq.gz demux_test_trimmed_NoCode.fq.gz; do
            TG_MD5=$(gzip -dc /tmp/tg/$f | md5sum | cut -d' ' -f1)
            OP_MD5=$(gzip -dc /tmp/op/$f | md5sum | cut -d' ' -f1)
            echo "$f: TG=$TG_MD5 OP=$OP_MD5"
            [ "$TG_MD5" = "$OP_MD5" ] || { echo "MISMATCH: $f differs!"; exit 1; }
          done

      - name: All validations passed
        run: echo "All Oxidized Edition outputs are byte-identical to Perl TrimGalore 0.6.11"
