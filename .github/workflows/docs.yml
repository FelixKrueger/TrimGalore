name: Deploy docs to GitHub Pages

on:
  push:
    branches: [master, dev]
    paths:
      - 'docs/**'
      - 'CHANGELOG.md'
      - '.github/workflows/docs.yml'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: docs
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Setup Node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          # Astro requires >=22.12.0; pin to 24 (current Active LTS).
          node-version: 24
          cache: npm
          cache-dependency-path: docs/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build site
        run: npm run build

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@fc324d3547104276b827a68afc52ff2a11cc49c9 # v5.0.0
        with:
          path: docs/dist

  deploy:
    runs-on: ubuntu-latest
    needs: build
    # Only the stable trunk publishes to www.trimgalore.com. Pushes to `dev`
    # still run the `build` job above (validation safety net) but skip this
    # step — preventing in-progress dev work from silently overwriting the
    # live docs site. Master pushes deploy as normal. workflow_dispatch
    # also dispatches a deploy regardless of ref, by design.
    if: github.ref == 'refs/heads/master' || github.event_name == 'workflow_dispatch'
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@cd2ce8fcbc39b97be8ca5fce6e763baed58fa128 # v5.0.0
