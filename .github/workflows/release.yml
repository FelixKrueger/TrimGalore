name: Release

# ------------------------------------------------------------------
# Release invariant:
#   Never push `v*` tags manually. This workflow creates and pushes
#   the tag itself during the create-tag-and-release job; an external
#   `git push origin v...` collides with the workflow's tag push and
#   can leave the release in a half-created state.
#
#   For dry-run validation before a real release, dispatch this
#   workflow with `dry_run: true` — all destructive side effects
#   (crates.io publish, tag push, Docker registry push, GitHub
#   release creation) are suppressed.
#
# Lint-gating note:
#   This workflow intentionally does NOT gate on the `lint` job from
#   ci.yml.  Releases are cut from commits that have already passed
#   ci.yml on the PR-merge path, so re-running lint here would duplicate
#   work without adding signal.  A hotfix tag pushed outside the normal
#   PR path could bypass the gate — mitigation is the social convention
#   that all release-bearing merges go through a PR.  Revisit if the
#   release automation rewires.
# ------------------------------------------------------------------

on:
  push:
    branches: [dev, master]
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Dry run — build, test, and validate without publishing to crates.io, pushing tags, pushing Docker images, or creating a GH release.'
        type: boolean
        default: false

permissions:
  contents: write
  packages: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always
  IMAGE_NAME: ${{ github.repository }}

jobs:
  # ------------------------------------------------------------------
  # 0. Detect whether this is a release run
  # ------------------------------------------------------------------
  check-release:
    name: Check release
    runs-on: ubuntu-latest
    outputs:
      is_release: ${{ steps.check.outputs.is_release }}
      is_prerelease: ${{ steps.check.outputs.is_prerelease }}
      is_dry_run: ${{ steps.check.outputs.is_dry_run }}
      version: ${{ steps.check.outputs.version }}
      version_major: ${{ steps.check.outputs.version_major }}
      version_minor: ${{ steps.check.outputs.version_minor }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 1
          fetch-tags: true

      - name: Detect release
        id: check
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            RAW_VERSION=$(grep '^version' Cargo.toml | head -1 | sed 's/.*"\(.*\)"/\1/')
            IS_PRERELEASE="false"
            [[ "$RAW_VERSION" == *-* ]] && IS_PRERELEASE="true"

            if [ "${{ github.ref_name }}" = "master" ]; then
              : # always allowed (GA)
            elif [ "${{ github.ref_name }}" = "dev" ] && [ "$IS_PRERELEASE" = "true" ]; then
              : # allowed for prereleases only
            else
              echo "::error::Release must be from master (GA) or dev (prerelease only); got ${{ github.ref_name }} with version $RAW_VERSION"
              exit 1
            fi

            VERSION="v$RAW_VERSION"
            MAJOR=$(echo "$RAW_VERSION" | cut -d. -f1)
            MINOR="${MAJOR}.$(echo "$RAW_VERSION" | cut -d. -f2)"

            echo "is_release=true" >> "$GITHUB_OUTPUT"
            echo "is_prerelease=$IS_PRERELEASE" >> "$GITHUB_OUTPUT"
            echo "is_dry_run=${{ inputs.dry_run }}" >> "$GITHUB_OUTPUT"
            echo "version=$VERSION" >> "$GITHUB_OUTPUT"
            echo "version_major=$MAJOR" >> "$GITHUB_OUTPUT"
            echo "version_minor=$MINOR" >> "$GITHUB_OUTPUT"

            if [ "${{ inputs.dry_run }}" = "true" ]; then
              echo "::warning::Dry run mode: no crates.io publish, no tag push, no Docker push, no GH release"
            fi

            if [ "${{ inputs.dry_run }}" != "true" ] && git tag -l "$VERSION" | grep -q .; then
              echo "::error::Tag $VERSION already exists"
              exit 1
            fi

            LOCK_VERSION=$(awk '/^name = "trim-galore"/{found=1} found && /^version =/{print; exit}' Cargo.lock | sed 's/.*"\(.*\)"/\1/')
            if [ "$LOCK_VERSION" != "$RAW_VERSION" ]; then
              echo "::error::Cargo.lock version ($LOCK_VERSION) does not match Cargo.toml version ($RAW_VERSION)"
              exit 1
            fi

            echo "Detected release: $VERSION (prerelease=$IS_PRERELEASE, dry_run=${{ inputs.dry_run }})"
          else
            echo "is_release=false" >> "$GITHUB_OUTPUT"
            echo "is_prerelease=false" >> "$GITHUB_OUTPUT"
            echo "is_dry_run=false" >> "$GITHUB_OUTPUT"
            echo "version=" >> "$GITHUB_OUTPUT"
            echo "Not a release run"
          fi

  # ------------------------------------------------------------------
  # 1. Build binaries for each target (release only)
  # ------------------------------------------------------------------
  build-binaries:
    name: Build ${{ matrix.name }}
    if: needs.check-release.outputs.is_release == 'true'
    needs: [check-release]
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: linux-x86_64
            os: ubuntu-latest
            target: x86_64-unknown-linux-gnu

          - name: linux-aarch64
            os: ubuntu-24.04-arm
            target: aarch64-unknown-linux-gnu

          - name: macos-aarch64
            os: macos-latest
            target: aarch64-apple-darwin

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
        with:
          targets: ${{ matrix.target }}

      - name: Build
        run: cargo build --release --locked --target ${{ matrix.target }}

      - name: Package
        id: package
        run: |
          BIN="trim_galore"
          ARCHIVE="${BIN}-${{ matrix.name }}"

          mkdir -p "staging/${ARCHIVE}"
          cp "target/${{ matrix.target }}/release/${BIN}" "staging/${ARCHIVE}/"
          cp README.md LICENSE "staging/${ARCHIVE}/" 2>/dev/null || true

          cd staging
          tar czf "../${ARCHIVE}.tar.gz" "${ARCHIVE}"
          cd ..

          shasum -a 256 "${ARCHIVE}.tar.gz" > "${ARCHIVE}.tar.gz.sha256"

          echo "archive=${ARCHIVE}.tar.gz" >> "$GITHUB_OUTPUT"
          echo "checksum=${ARCHIVE}.tar.gz.sha256" >> "$GITHUB_OUTPUT"

      - name: Upload build artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: binary-${{ matrix.name }}
          path: |
            ${{ steps.package.outputs.archive }}
            ${{ steps.package.outputs.checksum }}
          retention-days: 1

  # ------------------------------------------------------------------
  # 1a. Smoke test the linux binary
  # ------------------------------------------------------------------
  smoke-test-binaries:
    name: Smoke test binaries
    if: needs.check-release.outputs.is_release == 'true'
    needs: [check-release, build-binaries]
    runs-on: ubuntu-latest
    steps:
      - name: Download linux-x86_64 binary
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: binary-linux-x86_64
          path: /tmp/binaries

      - name: Smoke test
        run: |
          cd /tmp/binaries
          tar xzf trim_galore-linux-x86_64.tar.gz
          ./trim_galore-linux-x86_64/trim_galore --help
          ./trim_galore-linux-x86_64/trim_galore --version

  # ------------------------------------------------------------------
  # 2. Build per-platform Docker images on native runners
  # ------------------------------------------------------------------
  docker-build:
    name: Docker ${{ matrix.platform }}
    needs: [check-release]
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: linux/amd64
            runner: ubuntu-latest
          - platform: linux/arm64
            runner: ubuntu-24.04-arm
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Lowercase image name
        run: echo "IMAGE_NAME=${IMAGE_NAME,,}" >> "$GITHUB_ENV"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd # v4.0.0

      - name: Log in to GHCR
        uses: docker/login-action@4907a6ddec9925e35a0a9e82d7399ccc52663121 # v4.1.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push by digest
        id: build
        uses: docker/build-push-action@bcafcacb16a39f128d818304e6c9c0c18556b85f # v7.1.0
        with:
          context: .
          platforms: ${{ matrix.platform }}
          outputs: type=image,name=ghcr.io/${{ env.IMAGE_NAME }},push-by-digest=true,name-canonical=true,push=${{ needs.check-release.outputs.is_dry_run != 'true' }}
          cache-from: type=gha,scope=${{ matrix.platform }}
          cache-to: type=gha,scope=${{ matrix.platform }},mode=max

      - name: Export digest
        if: needs.check-release.outputs.is_dry_run != 'true'
        run: |
          mkdir -p /tmp/digests
          digest="${{ steps.build.outputs.digest }}"
          touch "/tmp/digests/${digest#sha256:}"

      - name: Upload digest
        if: needs.check-release.outputs.is_dry_run != 'true'
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: digests-${{ matrix.runner }}
          path: /tmp/digests/*
          if-no-files-found: error
          retention-days: 1

  # ------------------------------------------------------------------
  # 3. Merge per-platform images into a multi-arch manifest
  # ------------------------------------------------------------------
  docker-merge:
    name: Docker merge
    needs: [check-release, docker-build]
    runs-on: ubuntu-latest
    steps:
      - name: Lowercase image name
        run: echo "IMAGE_NAME=${IMAGE_NAME,,}" >> "$GITHUB_ENV"

      - name: Download digests
        if: needs.check-release.outputs.is_dry_run != 'true'
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          pattern: digests-*
          path: /tmp/digests
          merge-multiple: true

      - name: Docker meta
        id: meta
        uses: docker/metadata-action@030e881283bb7a6894de51c315a6bfe6a94e05cf # v6.0.0
        with:
          images: ghcr.io/${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=${{ needs.check-release.outputs.version }},enable=${{ needs.check-release.outputs.is_release == 'true' }}
            type=raw,value=${{ needs.check-release.outputs.version_minor }},enable=${{ needs.check-release.outputs.is_release == 'true' && needs.check-release.outputs.is_prerelease == 'false' }}
            type=raw,value=${{ needs.check-release.outputs.version_major }},enable=${{ needs.check-release.outputs.is_release == 'true' && needs.check-release.outputs.is_prerelease == 'false' }}
            type=raw,value=latest,enable=${{ needs.check-release.outputs.is_release == 'true' && needs.check-release.outputs.is_prerelease == 'false' }}
            type=raw,value=beta,enable=${{ needs.check-release.outputs.is_release == 'true' && needs.check-release.outputs.is_prerelease == 'true' }}
            type=raw,value=dev

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd # v4.0.0

      - name: Log in to GHCR
        uses: docker/login-action@4907a6ddec9925e35a0a9e82d7399ccc52663121 # v4.1.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Create manifest list and push
        if: needs.check-release.outputs.is_dry_run != 'true'
        working-directory: /tmp/digests
        run: |
          docker buildx imagetools create \
            $(jq -cr '.tags | map("-t " + .) | join(" ")' <<< "$DOCKER_METADATA_OUTPUT_JSON") \
            $(printf 'ghcr.io/${{ env.IMAGE_NAME }}@sha256:%s ' *)

      - name: Dry-run manifest preview
        if: needs.check-release.outputs.is_dry_run == 'true'
        run: |
          echo "Would create multi-arch manifest with tags:"
          jq -r '.tags[]' <<< "$DOCKER_METADATA_OUTPUT_JSON"

  # ------------------------------------------------------------------
  # 3a. Smoke test the Docker image
  # ------------------------------------------------------------------
  smoke-test-docker:
    name: Smoke test Docker
    needs: [check-release, docker-merge]
    if: needs.check-release.outputs.is_dry_run != 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Lowercase image name
        run: echo "IMAGE_NAME=${IMAGE_NAME,,}" >> "$GITHUB_ENV"

      - name: Pull and test
        run: |
          docker run --rm ghcr.io/${{ env.IMAGE_NAME }}:dev trim_galore --help
          docker run --rm ghcr.io/${{ env.IMAGE_NAME }}:dev trim_galore --version

  # ------------------------------------------------------------------
  # 4. Create tag and draft release (release only, after all builds)
  # ------------------------------------------------------------------
  create-tag-and-release:
    name: Create tag and release
    if: needs.check-release.outputs.is_release == 'true'
    needs: [check-release, build-binaries, smoke-test-binaries, docker-merge, smoke-test-docker]
    runs-on: ubuntu-latest
    outputs:
      tag: ${{ needs.check-release.outputs.version }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Create tag
        if: needs.check-release.outputs.is_dry_run != 'true'
        run: |
          git tag "${{ needs.check-release.outputs.version }}"
          git push origin "${{ needs.check-release.outputs.version }}"

      - name: Create release
        if: needs.check-release.outputs.is_dry_run != 'true'
        env:
          GH_TOKEN: ${{ github.token }}
          PRERELEASE_FLAG: ${{ needs.check-release.outputs.is_prerelease == 'true' && '--prerelease' || '' }}
        run: |
          gh release create "${{ needs.check-release.outputs.version }}" \
            --target "${{ github.sha }}" \
            --title "Trim Galore ${{ needs.check-release.outputs.version }}" \
            --generate-notes $PRERELEASE_FLAG

  # ------------------------------------------------------------------
  # 5. Upload binaries to the release
  # ------------------------------------------------------------------
  upload-binaries:
    name: Upload binaries
    if: needs.check-release.outputs.is_release == 'true' && needs.check-release.outputs.is_dry_run != 'true'
    needs: [check-release, create-tag-and-release, build-binaries]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Download all binary artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          pattern: binary-*
          path: /tmp/binaries
          merge-multiple: true

      - name: Upload to release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release upload "${{ needs.create-tag-and-release.outputs.tag }}" \
            /tmp/binaries/*.tar.gz \
            /tmp/binaries/*.sha256

  # ------------------------------------------------------------------
  # 6. Publish to crates.io (release only, last step)
  # ------------------------------------------------------------------
  publish-crate:
    name: Publish to crates.io
    if: needs.check-release.outputs.is_release == 'true' && needs.check-release.outputs.is_dry_run != 'true'
    needs: [check-release, upload-binaries]
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable

      - name: Authenticate with crates.io
        id: auth
        uses: rust-lang/crates-io-auth-action@bbd81622f20ce9e2dd9622e3218b975523e45bbe # v1.0.4

      - name: Publish to crates.io
        run: cargo publish --no-verify
        env:
          CARGO_REGISTRY_TOKEN: ${{ steps.auth.outputs.token }}
